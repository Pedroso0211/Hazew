      proposta: { bg: "#DBEAFE", color: C.blue, label: "Proposta" },
      aprovado: { bg: "#DCFCE7", color: C.green, label: "Aprovado" },
      pendente: { bg: "#FEF9C3", color: C.amber, label: "Pendente" },
      recusado: { bg: "#FEE2E2", color: C.red, label: "Recusado" },
      producao: { bg: "#EDE9FE", color: C.purple, label: "Produção" },
      design: { bg: "#DBEAFE", color: C.blue, label: "Design" },
      impressao: { bg: "#FEF3C7", color: C.amber, label: "Impressão" },
      aplicacao: { bg: "#D1FAE5", color: C.green, label: "Aplicação" },
      em_curso: { bg: "#DBEAFE", color: C.blue, label: "Em Curso" },
      concluido: { bg: "#F0FDF4", color: C.green, label: "Concluído" },
      recebido: { bg: "#DCFCE7", color: C.green, label: "Recebido" },
      por_receber: { bg: "#FEF9C3", color: C.amber, label: "Por Receber" },
      atraso: { bg: "#FEE2E2", color: C.red, label: "Atraso" }
    };

    function can(user, perm) {
      return user?.perms?.includes("all") || user?.perms?.includes(perm);
    }
    const uid = () => Math.random().toString(36).slice(2, 9);
    const fmt = v => new Intl.NumberFormat("pt-PT", { style: "currency", currency: "EUR" }).format(Number(v || 0));
    const fmtDate = d => d ? new Intl.DateTimeFormat("pt-PT").format(new Date(d)) : "—";
    const todayISO = () => new Date().toISOString().split("T")[0];
    const amountOf = item => Number(item?.value ?? item?.amount ?? 0);
    const descOf = item => item?.desc ?? item?.description ?? "Sem descrição";
    function daysLeft(dateValue) {
      if (!dateValue) return null;
      const end = new Date(String(dateValue).slice(0, 10) + "T00:00:00");
      const now = new Date(); now.setHours(0, 0, 0, 0);
      return Math.ceil((end - now) / 86400000);
    }
    function getUserById(id) {
      return USERS.find(u => u.id === id) || { id, name: "—", role: "", avatar: "?", color: "#888" };
    }
    function getFirstName(name) { return (name || "").split(" ")[0] || "Utilizador"; }
    function normalizeUser(row, fallback) {
      const base = fallback || USERS.find(u => u.id === row?.id) || USERS[0];
      return { ...base, ...(row || {}), perms: base.perms || ["orders"] };
    }
    function taskToOrder(t) {
      return {
        id: t.id,
        title: t.title,
        client_id: t.client_id,
        clientId: t.client_id,
        deadline: t.deadline,
        status: t.status === "em_curso" ? "producao" : (t.status || "pendente"),
        assignee_id: t.assignee_id,
        assignee: t.assignee_id,
        priority: t.priority || "media",
        progress: t.status === "concluido" ? 100 : t.status === "em_curso" ? 60 : 0,
        note: t.description || ""
      };
    }

    async function ensureUsersForRelations() {
      const payload = USERS.map(u => ({ id: u.id, name: u.name, role: u.role }));
      const { error } = await supabaseClient.from("users").upsert(payload, { onConflict: "id" });
      if (error) {
        console.error(error);
        alert("Erro ao sincronizar utilizadores: " + error.message);
        return false;
      }
      return true;
    }

    async function ensureDefaultPasswords() {
      const { data, error } = await supabaseClient.from("users").select("id,password");
      if (error) return false;
      const byId = Object.fromEntries((data || []).map(row => [row.id, row]));
      for (const u of USERS) {
        const row = byId[u.id];
        if (!row || !row.password) {
          await supabaseClient.from("users").update({ password: DEFAULT_PASSWORDS[u.id] }).eq("id", u.id);
        }
      }
      return true;
    }


    function urlBase64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    async function enablePushNotificationsForUser(user) {
      if (!user?.id) return alert("Faz login primeiro.");
      if (!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY.includes("COLA_AQUI")) {
        return alert("Ainda falta colar a VAPID_PUBLIC_KEY no index.html.");
      }
      if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) {
        return alert("Este telemóvel/navegador não suporta notificações push web.");
      }
      if (Notification.permission === "denied") {
        return alert("As notificações estão bloqueadas. Tens de permitir nas definições do navegador/telemóvel.");
      }

      const registration = await navigator.serviceWorker.register("/service-worker.js");
      const permission = await Notification.requestPermission();
      if (permission !== "granted") return alert("Tens de aceitar as notificações para isto funcionar.");

      let subscription = await registration.pushManager.getSubscription();
      if (!subscription) {
        subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      }

      const payload = {
        user_id: user.id,
        endpoint: subscription.endpoint,
        subscription: subscription.toJSON(),
        user_agent: navigator.userAgent,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("push_subscriptions")
        .upsert(payload, { onConflict: "endpoint" });

      if (error) return alert("Erro ao guardar este telemóvel para notificações: " + error.message);
      alert("🔔 Notificações ativadas neste telemóvel.");
    }

    async function sendPushToUser(userId, title, body, url = window.location.origin) {
      if (!userId) return;
      if (!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY.includes("COLA_AQUI")) return;
      try {
        const { error } = await supabaseClient.functions.invoke("send-push", {
          body: { user_id: userId, title, body, url }
        });
        if (error) console.warn("Push falhou:", error.message || error);
      } catch (err) {
        console.warn("Push falhou:", err);
      }
    }

    function Avatar({ u, size = 32 }) {
      return <div className="avatar" style={{ width: size, height: size, background: u?.color || "#888", fontSize: size * .32, boxShadow: `0 4px 12px rgba(0,0,0,0.15), 0 0 0 2px #fff`, border: `2px solid ${u?.color || "#888"}20` }}>{u?.avatar || "?"}</div>;
    }
    function Badge({ s }) {
      const m = statusMeta[s] || { bg: "#F3F4F6", color: "#666", label: String(s || "—").replaceAll("_", " ") };
      return <span className="badge" style={{ background: m.bg, color: m.color }}>{m.label}</span>;
    }
    function Tag({ children, color = C.muted }) {
      return <span className="tag" style={{ color, background: color + "18" }}>{children}</span>;
    }
    function SectionHeader({ title, subtitle, action }) {
      return <div className="section-header"><div><h2>{title}</h2>{subtitle && <p>{subtitle}</p>}</div>{action}</div>;
    }
    function Modal({ title, onClose, children }) {
      return <div className="modal-backdrop"><div className="modal"><div className="modal-head"><h3>{title}</h3><button className="close-btn" onClick={onClose}>✕</button></div><div className="modal-body">{children}</div></div></div>;
    }
    function Field({ label, children }) {
      return <div><label>{label}</label>{children}</div>;
    }

    function Login({ onLogin }) {
      const [selectedUser, setSelectedUser] = useState(null);
      const [passwordInput, setPasswordInput] = useState("");
      const [checking, setChecking] = useState(false);

      async function handleLogin() {
        if (!selectedUser || checking) return;
        setChecking(true);
        const ok = await ensureUsersForRelations();
        if (ok) await ensureDefaultPasswords();
        const { data, error } = await supabaseClient.from("users").select("id,name,role,password").eq("id", selectedUser.id).maybeSingle();
        setChecking(false);
        if (error) return alert("Erro ao verificar password: " + error.message);
        if (!data?.password) return alert("Este utilizador ainda não tem password na base de dados.");
        if (passwordInput !== data.password) return alert("❌ Chave de acesso incorreta.");
        onLogin(normalizeUser(data, selectedUser));
        setPasswordInput("");
      }

      return <div className="login-wrap"><div className="login-card">
        <div style={{ textAlign: "center", marginBottom: 20 }}>
          <div className="logo" style={{ color: C.dark, fontSize: 24 }}>Studio<span>D</span></div>
          <p style={{ fontSize: 12, color: C.muted, margin: "6px 0 0" }}>CRM · Controlo Operacional</p>
        </div>
        {!selectedUser ? <>
          <label style={{ textAlign: "center" }}>Quem está a entrar?</label>
          <div className="user-grid">
            {USERS.map(u => <button key={u.id} className="user-select-card" onClick={() => setSelectedUser(u)}>
              <Avatar u={u} size={38} />
              <div style={{ fontSize: 13, fontWeight: 800, marginTop: 8 }}>{getFirstName(u.name)}</div>
            </button>)}
          </div>
        </> : <>
          <div className="card" style={{ display: "flex", alignItems: "center", gap: 12, padding: 12 }}>
            <Avatar u={selectedUser} />
            <div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: 800 }}>{selectedUser.name}</div></div>
            <button className="btn ghost small" onClick={() => { setSelectedUser(null); setPasswordInput(""); }}>Alterar</button>
          </div>
          <Field label="Código PIN / Password">
            <input type="password" placeholder="Introduzir senha..." value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} autoFocus />
          </Field>
          <button className="btn full" onClick={handleLogin} disabled={checking}>{checking ? "A verificar..." : "Entrar"}</button>
        </>}
      </div></div>;
    }

    function Dashboard({ db, user }) {
      const ordersSource = db.orders.length ? db.orders : db.tasks.map(taskToOrder);
      const activeProjects = ordersSource.filter(o => (o.status || "") !== "concluido").length;
      const activeClients = db.clients.filter(c => (c.status || "ativo") === "ativo").length;
      const totalPending = db.payments.filter(p => ["pendente", "por_receber", "atraso"].includes(p.status || "por_receber")).reduce((s, p) => s + amountOf(p), 0);
      const totalApproved = db.quotes.filter(q => (q.status || "") === "aprovado").reduce((s, q) => s + amountOf(q), 0);
      const urgent = ordersSource.filter(o => (o.status || "") !== "concluido" && daysLeft(o.deadline) !== null && daysLeft(o.deadline) <= 2);

      return <>
        <SectionHeader title={`Olá, ${getFirstName(user.name)} 👋`} subtitle={`StudioD`} />
        <div className="grid-2" style={{ marginBottom: 24 }}>
          {[
            { label: "Clientes Ativos", value: activeClients, color: C.blue, bg: "#DBEAFE" },
            { label: "Projetos Ativos", value: activeProjects, color: C.purple, bg: "#EDE9FE" },
            { label: "A Receber", value: fmt(totalPending), color: C.amber, bg: "#FEF9C3" },
            { label: "Orçamentos Aprova.", value: fmt(totalApproved), color: C.green, bg: "#DCFCE7" }
          ].map(s => <div key={s.label} className="soft-card" style={{ background: s.bg }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 12, color: s.color, fontWeight: 700, marginTop: 2 }}>{s.label}</div>
          </div>)}
        </div>

        {urgent.length > 0 && <>
          <div style={{ fontWeight: 800, fontSize: 15, marginBottom: 10 }}>🚨 Prazos Urgentes</div>
          {urgent.slice(0, 5).map(o => {
            const dl = daysLeft(o.deadline);
            const client = db.clients.find(c => c.id === (o.clientId || o.client_id));
            return <div key={o.id} style={{ background: "#FEF2F2", border: "1.5px solid #FECACA", borderRadius: 12, padding: "12px 16px", marginBottom: 8 }} className="between">
              <div><div style={{ fontWeight: 700, fontSize: 14 }}>{o.title}</div><div className="tiny muted">{client?.name || "Sem cliente"}</div></div>
              <span style={{ color: C.red, fontWeight: 900, fontSize: 13 }}>{dl < 0 ? `${Math.abs(dl)}d atraso` : dl === 0 ? "HOJE" : `${dl}d`}</span>
            </div>;
          })}
        </>}

        <div style={{ fontWeight: 800, fontSize: 15, margin: "20px 0 10px" }}>📋 Últimas Encomendas</div>
        {ordersSource.slice(0, 3).map(o => {
          const client = db.clients.find(c => c.id === (o.clientId || o.client_id));
          return <div key={o.id} className="card between" style={{ padding: "12px 16px" }}>
            <div><div style={{ fontWeight: 700, fontSize: 13 }}>{o.title}</div><div className="tiny muted">{client?.name || "Sem cliente"}</div></div>
            <Badge s={o.status || "pendente"} />
          </div>;
        })}
        {ordersSource.length === 0 && <div className="card empty">Ainda não há encomendas ou tarefas para mostrar.</div>}
      </>;
    }

    function Tasks({ db, user, refresh, setDb }) {
      const [modal, setModal] = useState(false);
      const [filter, setFilter] = useState("todas");
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({ title: "", description: "", assignee_id: user.id === "ceo" ? "u1" : user.id, client_id: "", deadline: todayISO(), priority: "media", status: "pendente" });
      const isCeo = can(user, "all");
      const priorityColor = p => p === "alta" ? C.red : p === "media" ? C.amber : C.muted;
      const statusColors = { pendente: { bg: "#FEF9C3", color: C.amber }, em_curso: { bg: "#DBEAFE", color: C.blue }, concluido: { bg: "#DCFCE7", color: C.green } };
      const statusLabels = { pendente: "Pendente", em_curso: "Em Curso", concluido: "Concluído" };

      const visible = db.tasks.filter(t => {
        if (!isCeo && t.assignee_id !== user.id && t.assigned_by_id !== user.id) return false;
        if (filter !== "todas" && t.status !== filter) return false;
        return true;
      });
      const base = isCeo ? db.tasks : db.tasks.filter(t => t.assignee_id === user.id || t.assigned_by_id === user.id);
      const total = base.length;
      const done = base.filter(t => t.status === "concluido").length;
      const late = base.filter(t => t.status !== "concluido" && daysLeft(t.deadline) !== null && daysLeft(t.deadline) < 0).length;

      function openNew() {
        setForm({ title: "", description: "", assignee_id: user.id === "ceo" ? "u1" : user.id, client_id: "", deadline: todayISO(), priority: "media", status: "pendente" });
        setModal(true);
      }

      async function saveTask() {
        if (!form.title.trim()) return alert("Mete um título na tarefa primeiro.");
        if (!form.assignee_id) return alert("Escolhe quem vai fazer a tarefa.");
        setSaving(true);
        const ok = await ensureUsersForRelations();
        if (!ok) { setSaving(false); return; }
        const payload = { title: form.title.trim(), description: form.description.trim() || null, assignee_id: form.assignee_id, assigned_by_id: user.id, client_id: form.client_id || null, status: form.status, priority: form.priority, deadline: form.deadline || null, updated_at: new Date().toISOString() };
        const { data, error } = await supabaseClient.from("tasks").insert(payload).select().single();
        if (error) { setSaving(false); return alert("Erro ao guardar tarefa: " + error.message); }
        if (data?.id && form.assignee_id) {
          const message = `${user.name} atribuiu-te: ${form.title.trim()}`;
          await supabaseClient.from("notifications").insert({ user_id: form.assignee_id, task_id: data.id, message, read: false });
          await sendPushToUser(form.assignee_id, "Nova tarefa atribuída", message);
        }
        setDb(p => ({ ...p, tasks: data ? [data, ...p.tasks] : p.tasks }));
        setModal(false);
        setSaving(false);
        await refresh();
      }

      async function updateTask(task, patch) {
        const { error } = await supabaseClient.from("tasks").update({ ...patch, updated_at: new Date().toISOString() }).eq("id", task.id);
        if (error) return alert("Erro ao atualizar tarefa: " + error.message);
        if (patch.status === "concluido") {
          const targetUser = task.assigned_by_id || "ceo";
          const message = `${getUserById(task.assignee_id).name} concluiu: ${task.title}`;
          await supabaseClient.from("notifications").insert({ user_id: targetUser, task_id: task.id, message, read: false });
          await sendPushToUser(targetUser, "Tarefa concluída", message);
        }
        setDb(p => ({ ...p, tasks: p.tasks.map(t => t.id === task.id ? { ...t, ...patch } : t) }));
        await refresh();
      }

      async function deleteTask(task) {
        if (!confirm("Eliminar esta tarefa?")) return;

        // Primeiro apaga as notificações ligadas à tarefa.
        // Isto evita o erro de chave estrangeira no Supabase quando notifications.task_id aponta para tasks.id.
        const { error: notifError } = await supabaseClient
          .from("notifications")
          .delete()
          .eq("task_id", task.id);

        if (notifError) {
          console.warn("Não consegui apagar notificações da tarefa:", notifError);
          const keepGoing = confirm("Não consegui apagar as notificações ligadas a esta tarefa. Queres tentar apagar a tarefa na mesma?");
          if (!keepGoing) return;
        }

        const { error } = await supabaseClient.from("tasks").delete().eq("id", task.id);
        if (error) {
          return alert(
             "Erro ao eliminar tarefa: " + error.message +
            "\n\nSe aparecer algo de foreign key, corre o SQL que te deixei para meter ON DELETE CASCADE nas notificações."
          );
        }

        setDb(p => ({
          ...p,
          tasks: p.tasks.filter(t => t.id !== task.id),
          notifications: p.notifications.filter(n => n.task_id !== task.id)
        }));
        await refresh();
      }

      const TaskCard = ({ t, compact }) => {
        const assignee = getUserById(t.assignee_id);
        const client = db.clients.find(c => c.id === t.client_id);
        const dl = daysLeft(t.deadline);
        const dlColor = dl === null ? C.muted : dl < 0 ? C.red : dl <= 2 ? C.amber : C.green;
        const sm = statusColors[t.status || "pendente"] || statusColors.pendente;
        return <div className={compact ? "kanban-card" : "card"}>
          <div className="between" style={{ alignItems: "flex-start", marginBottom: 6 }}>
            <span className="tag" style={{ background: priorityColor(t.priority) + "22", color: priorityColor(t.priority), textTransform: "uppercase" }}>{t.priority || "media"}</span>
            {isCeo && <button onClick={() => deleteTask(t)} style={{ background: "none", border: "none", color: "#CCC", fontWeight: 900 }}>✕</button>}
          </div>
          <div style={{ fontWeight: 800, fontSize: compact ? 13 : 15, marginBottom: 4, lineHeight: 1.3 }}>{t.title}</div>
          {t.description && <div style={{ fontSize: compact ? 11 : 12, color: C.muted, marginBottom: 8, lineHeight: 1.45 }}>{t.description}</div>}
          {!compact && <div className="row" style={{ marginBottom: 8 }}><span className="badge" style={{ background: sm.bg, color: sm.color }}>{statusLabels[t.status] || t.status}</span><span className="tiny muted">🏢 {client?.name || "Sem cliente"}</span></div>}
          <div className="between">
            <div className="row"><Avatar u={assignee} size={compact ? 20 : 22} /><span className="tiny muted">{getFirstName(assignee.name)}</span></div>
            <span className="tiny" style={{ color: dlColor, fontWeight: 800 }}>{dl === null ? "Sem prazo" : dl < 0 ? `${Math.abs(dl)}d atraso` : dl === 0 ? "Hoje" : `${dl}d`}</span>
          </div>
          {t.status !== "concluido" && <div className="row" style={{ marginTop: 10, flexWrap: "wrap" }}>
            {t.status === "pendente" && <button className="btn ghost small" onClick={() => updateTask(t, { status: "em_curso" })}>▶ Iniciar</button>}
            <button className="btn small" onClick={() => updateTask(t, { status: "concluido" })}>✅ Concluir</button>
          </div>}
        </div>;
      };

      return <>
        <SectionHeader title="Tarefas" subtitle={isCeo ? "Atribuição e acompanhamento da equipa" : "As minhas tarefas"} action={<button className="btn" onClick={openNew}>+ Atribuir Tarefa</button>} />
        <div className="grid-3" style={{ marginBottom: 20 }}>
          {[[total,"Total","📋",C.blue,"#DBEAFE"],[done,"Concluídas","✅",C.green,"#DCFCE7"],[late,"Atrasadas","🚨",C.red,"#FEE2E2"]].map(([v,l,i,color,bg]) => <div key={l} className="soft-card" style={{ background: bg }}><div style={{ fontSize: 22, fontWeight: 900, color }}>{v}</div><div style={{ fontSize: 11, color, fontWeight: 700 }}>{i} {l}</div></div>)}
        </div>
        <div className="row" style={{ marginBottom: 16, flexWrap: "wrap" }}>
          {[["todas","Todas"],["pendente","Pendentes"],["em_curso","Em Curso"],["concluido","Concluídas"]].map(([v,l]) => <button key={v} onClick={() => setFilter(v)} className={`btn small ${filter === v ? "" : "ghost"}`}>{l}</button>)}
        </div>

        {isCeo ? <div className="kanban">
          {["pendente", "em_curso", "concluido"].map(col => {
            const colTasks = visible.filter(t => (t.status || "pendente") === col);
            const sm = statusColors[col];
            return <div key={col} className="kanban-col"><div className="between" style={{ marginBottom: 12 }}><span className="badge" style={{ background: sm.bg, color: sm.color }}>{statusLabels[col]}</span><span className="tiny muted" style={{ fontWeight: 800 }}>{colTasks.length}</span></div><div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{colTasks.map(t => <TaskCard key={t.id} t={t} compact />)}{colTasks.length === 0 && <div className="empty" style={{ padding: "16px 0", color: "#DDD" }}>—</div>}</div></div>;
          })}
        </div> : <div>{visible.map(t => <TaskCard key={t.id} t={t} />)}{visible.length === 0 && <div className="card empty">Nenhuma tarefa para mostrar.</div>}</div>}

        {modal && <Modal title="Atribuir Nova Tarefa" onClose={() => setModal(false)}>
          <Field label="Título da Tarefa *"><input value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Ex: Cortar peças CNC projeto Alpha" /></Field>
          <Field label="Descrição / Instruções"><textarea rows="3" value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} placeholder="Detalhes, referências, ficheiros..." /></Field>
          <div className="grid-2">
            <Field label="Atribuir a *"><select value={form.assignee_id} onChange={e => setForm({ ...form, assignee_id: e.target.value })}>{USERS.filter(u => u.id !== "ceo").map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</select></Field>
            <Field label="Cliente (opcional)"><select value={form.client_id} onChange={e => setForm({ ...form, client_id: e.target.value })}><option value="">Sem cliente</option>{db.clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></Field>
            <Field label="Prazo *"><input type="date" value={form.deadline} onChange={e => setForm({ ...form, deadline: e.target.value })} /></Field>
            <Field label="Prioridade"><select value={form.priority} onChange={e => setForm({ ...form, priority: e.target.value })}><option value="alta">Alta</option><option value="media">Média</option><option value="baixa">Baixa</option></select></Field>
            <Field label="Estado Inicial"><select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}><option value="pendente">Pendente</option><option value="em_curso">Em Curso</option></select></Field>
          </div>
          <div className="row"><button className="btn ghost" onClick={() => setModal(false)}>Cancelar</button><button className="btn" onClick={saveTask} disabled={saving}>{saving ? "A guardar..." : "Atribuir Tarefa"}</button></div>
        </Modal>}
      </>;
    }

    function Clients({ db, setDb, refresh, user }) {
      const [modal, setModal] = useState(false);
      const [detail, setDetail] = useState(null);
      const [search, setSearch] = useState("");
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({ name: "", contact: "", phone: "", email: "", nif: "", city: "", status: "ativo", note: "" });
      const filtered = db.clients.filter(c => [c.name, c.contact, c.phone, c.email, c.city].some(x => String(x || "").toLowerCase().includes(search.toLowerCase())));

      function openNew() { setForm({ name: "", contact: "", phone: "", email: "", nif: "", city: "", status: "ativo", note: "" }); setModal(true); }
      async function saveClient() {
        if (!form.name.trim()) return alert("Mete pelo menos o nome do cliente/empresa.");
        setSaving(true);
        const payload = { name: form.name.trim(), contact: form.contact.trim() || null, phone: form.phone.trim() || null, email: form.email.trim() || null, nif: form.nif.trim() || null, city: form.city.trim() || null, status: form.status || "ativo", note: form.note.trim() || null };
        const { data, error } = await supabaseClient.from("clients").insert(payload).select().single();
        setSaving(false);
        if (error) return alert("Erro ao guardar cliente: " + error.message);
        setDb(p => ({ ...p, clients: data ? [...p.clients, data].sort((a,b) => (a.name || "").localeCompare(b.name || "")) : p.clients }));
        setModal(false);
        await refresh();
      }

      async function deleteClient(client) {
        if (!client?.id) return;
        const ok = confirm(
          `Eliminar o cliente "${client.name}"?\n\nOs trabalhos, orçamentos, encomendas e pagamentos ligados a este cliente NÃO são apagados. Só ficam sem cliente associado.`
        );
        if (!ok) return;

        setSaving(true);

        // Primeiro tira a ligação do cliente nas tabelas que podem apontar para clients.id.
        // Assim evitamos erros de foreign key no Supabase.
        const linkedTables = ["tasks", "quotes", "orders", "payments"];
        for (const table of linkedTables) {
          const { error: unlinkError } = await supabaseClient
            .from(table)
            .update({ client_id: null })
            .eq("client_id", client.id);

          if (unlinkError) {
            console.warn(`Não consegui limpar client_id em ${table}:`, unlinkError.message || unlinkError);
          }
        }

        const { error } = await supabaseClient
          .from("clients")
          .delete()
          .eq("id", client.id);

        setSaving(false);

        if (error) {
          return alert(
            "Erro ao eliminar cliente: " + error.message +
            "\n\nSe continuar a dar erro, pode haver uma ligação na base de dados que não deixa apagar este cliente."
          );
        }

        setDb(p => ({
          ...p,
          clients: p.clients.filter(c => c.id !== client.id),
          tasks: p.tasks.map(t => t.client_id === client.id ? { ...t, client_id: null } : t),
          quotes: p.quotes.map(q => q.client_id === client.id ? { ...q, client_id: null } : q),
          orders: p.orders.map(o => o.client_id === client.id ? { ...o, client_id: null } : o),
          payments: p.payments.map(pay => pay.client_id === client.id ? { ...pay, client_id: null } : pay)
        }));

        setDetail(null);
        await refresh();
      }
      return <>
        <SectionHeader title="Clientes" subtitle={`${db.clients.length} clientes registados`} action={<button className="btn" onClick={openNew}>+ Novo Cliente</button>} />
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Pesquisar cliente..." style={{ maxWidth: 320, marginBottom: 16 }} />
        <div style={{ display: "grid", gap: 10 }}>
          {filtered.map(c => <div key={c.id} onClick={() => setDetail(c)} className="card" style={{ display: "flex", alignItems: "center", gap: 16, cursor: "pointer" }}>
            <div style={{ width: 44, height: 44, borderRadius: 12, background: C.dark, color: C.accent, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900 }}>{String(c.name || "??").slice(0, 2).toUpperCase()}</div>
            <div style={{ flex: 1 }}><div style={{ fontWeight: 800, fontSize: 15 }}>{c.name}</div><div className="tiny muted">{c.contact || "Sem contacto"} · {c.city || "—"}</div></div>
            <Badge s={c.status || "ativo"} />
          </div>)}
          {filtered.length === 0 && <div className="card empty">Nenhum cliente encontrado.</div>}
        </div>
        {detail && <Modal title={detail.name} onClose={() => setDetail(null)}>
          <div className="grid-2" style={{ gap: 8, marginBottom: 14 }}>
            {[["Contacto", detail.contact], ["Telefone", detail.phone], ["Email", detail.email], ["NIF", detail.nif], ["Cidade", detail.city]].map(([k, v]) => <div key={k} style={{ background: "var(--bg)", borderRadius: 10, padding: "10px 14px" }}><div className="tiny muted" style={{ fontWeight: 800, marginBottom: 2 }}>{k.toUpperCase()}</div><div style={{ fontSize: 13, fontWeight: 700 }}>{v || "—"}</div></div>)}
            <div style={{ background: "var(--bg)", borderRadius: 10, padding: "10px 14px" }}><div className="tiny muted" style={{ fontWeight: 800, marginBottom: 4 }}>ESTADO</div><Badge s={detail.status || "ativo"} /></div>
          </div>
          {detail.note && <div style={{ background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#92400E", marginBottom: 12 }}>📝 {detail.note}</div>}
          {can(user, "clients") && <div className="row" style={{ marginTop: 14, justifyContent: "flex-end" }}>
            <button className="btn danger" onClick={() => deleteClient(detail)} disabled={saving}>
              {saving ? "A apagar..." : "🗑️ Apagar Cliente"}
            </button>
          </div>}
        </Modal>}
        {modal && <Modal title="Novo Cliente" onClose={() => setModal(false)}>
          <div className="grid-2">
            <div style={{ gridColumn: "1 / -1" }}><Field label="Nome da Empresa *"><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} /></Field></div>
            <Field label="Nome do Contacto"><input value={form.contact} onChange={e => setForm({ ...form, contact: e.target.value })} /></Field>
            <Field label="Telefone"><input value={form.phone} onChange={e => setForm({ ...form, phone: e.target.value })} /></Field>
            <Field label="Email"><input type="email" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} /></Field>
            <Field label="NIF"><input value={form.nif} onChange={e => setForm({ ...form, nif: e.target.value })} /></Field>
            <Field label="Cidade"><input value={form.city} onChange={e => setForm({ ...form, city: e.target.value })} /></Field>
            <Field label="Estado"><select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}><option value="ativo">Ativo</option><option value="inativo">Inativo</option><option value="proposta">Proposta</option></select></Field>
            <div style={{ gridColumn: "1 / -1" }}><Field label="Notas"><textarea rows="3" value={form.note} onChange={e => setForm({ ...form, note: e.target.value })} /></Field></div>
          </div>
          <div className="row"><button className="btn ghost" onClick={() => setModal(false)}>Cancelar</button><button className="btn" onClick={saveClient} disabled={saving}>{saving ? "A guardar..." : "Criar Cliente"}</button></div>
        </Modal>}
      </>;
    }

    function Quotes({ db, setDb, refresh, user }) {
      const [modal, setModal] = useState(false);
      const [saving, setSaving] = useState(false);
      const [form, setForm] = useState({
        client_id: "",
        title: "",
        value: "",
        date: todayISO(),
        status: "pendente",
        items: ""
      });

      const totalApproved = db.quotes
        .filter(q => (q.status || "pendente") === "aprovado")
        .reduce((s, q) => s + amountOf(q), 0);

      function openNew() {
        setForm({
          client_id: db.clients[0]?.id || "",
          title: "",
          value: "",
          date: todayISO(),
          status: "pendente",
          items: ""
        });
        setModal(true);
      }

      async function saveQuote() {
        if (!form.title.trim()) return alert("Mete um título no orçamento primeiro.");
        setSaving(true);

        const payload = {
          client_id: form.client_id || null,
          title: form.title.trim(),
          value: Number(form.value || 0),
          date: form.date || todayISO(),
          status: form.status || "pendente",
          items: form.items.trim() || null,
          updated_at: new Date().toISOString()
        };

        const { data, error } = await supabaseClient
          .from("quotes")
          .insert(payload)
          .select()
          .single();

        setSaving(false);
        if (error) {
          return alert(
             "Erro ao guardar orçamento: " + error.message +
            "\n\nConfirma se a tabela quotes existe no Supabase e se tem as colunas client_id, title, value, date, status e items."
          );
        }

        setDb(p => ({ ...p, quotes: data ? [data, ...p.quotes] : p.quotes }));
        setModal(false);
        await refresh();
      }

      async function updateQuoteStatus(quote, status) {
        const { data, error } = await supabaseClient
          .from("quotes")
          .update({ status, updated_at: new Date().toISOString() })
          .eq("id", quote.id)
          .select()
          .maybeSingle();

        if (error) {
          return alert(
            "Erro ao atualizar orçamento: " + error.message +
            "\n\nSe tentaste marcar como concluído, corre o SQL de atualização para permitir o estado concluido na tabela quotes."
          );
        }
        setDb(p => ({
          ...p,
          quotes: p.quotes.map(q => q.id === quote.id ? { ...q, ...(data || {}), status } : q)
        }));
        await refresh();
      }

      async function deleteQuote(quote) {
        if (!confirm("Eliminar este orçamento?")) return;

        const { error } = await supabaseClient
          .from("quotes")
          .delete()
          .eq("id", quote.id);

        if (error) {
          return alert(
            "Erro ao eliminar orçamento: " + error.message +
            "\n\nSe este orçamento estiver ligado a encomendas ou pagamentos, confirma se as foreign keys estão com ON DELETE SET NULL."
          );
        }

        setDb(p => ({
          ...p,
          quotes: p.quotes.filter(q => q.id !== quote.id)
        }));
        await refresh();
      }

      return <>
        <SectionHeader
          title="Orçamentos"
          subtitle={`${fmt(totalApproved)} aprovados`}
          action={can(user, "quotes") && <button className="btn" onClick={openNew}>+ Novo Orçamento</button>}
        />

        {db.quotes.length === 0 ? <div className="card empty">Ainda não tens orçamentos guardados.</div> : db.quotes.map(q => {
          const cl = db.clients.find(c => c.id === (q.clientId || q.client_id));
          const status = q.status || "pendente";
          return <div key={q.id} className="card">
            <div className="between" style={{ alignItems: "flex-start", marginBottom: 8 }}>
              <div>
                <div style={{ fontWeight: 800, fontSize: 15 }}>{q.title || q.description || "Orçamento"}</div>
                <div className="tiny muted" style={{ marginTop: 2 }}>{cl?.name || "Sem cliente"} · {fmtDate(q.date || q.created_at)}</div>
                {q.items && <div style={{ fontSize: 12, color: C.mid, marginTop: 4 }}>{q.items}</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontWeight: 900, fontSize: 18 }}>{fmt(amountOf(q))}</div>
                <Badge s={status} />
              </div>
            </div>

            {can(user, "quotes") && <div className="row" style={{ marginTop: 10, flexWrap: "wrap" }}>
              {status === "pendente" && <button className="btn small" onClick={() => updateQuoteStatus(q, "aprovado")}>✅ Aprovar</button>}
              {status === "pendente" && <button className="btn danger small" onClick={() => updateQuoteStatus(q, "recusado")}>✕ Recusar</button>}
              {status !== "concluido" && <button className="btn green small" onClick={() => updateQuoteStatus(q, "concluido")}>✅ Concluir</button>}
              <button className="btn danger small" onClick={() => deleteQuote(q)}>🗑️ Apagar</button>
            </div>}
          </div>;
        })}

        {modal && <Modal title="Novo Orçamento" onClose={() => setModal(false)}>
          <Field label="Cliente">
            <select value={form.client_id} onChange={e => setForm({ ...form, client_id: e.target.value })}>
              <option value="">Sem cliente</option>
              {db.clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </Field>
          <Field label="Título *">
            <input value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Ex: Lettering fachada" />
          </Field>
          <div className="grid-2">
            <Field label="Valor (€)">
              <input type="number" step="0.01" value={form.value} onChange={e => setForm({ ...form, value: e.target.value })} />
            </Field>
            <Field label="Data">
              <input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} />
            </Field>
            <Field label="Estado">
              <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
                <option value="pendente">Pendente</option>
                <option value="aprovado">Aprovado</option>
                <option value="recusado">Recusado</option>
                <option value="concluido">Concluído</option>
              </select>
            </Field>
          </div>
          <Field label="Descrição / Itens">
            <textarea rows="3" value={form.items} onChange={e => setForm({ ...form, items: e.target.value })} placeholder="Ex: Letras 3D inox 40cm x 8un" />
          </Field>
          <div className="row">
            <button className="btn ghost" onClick={() => setModal(false)}>Cancelar</button>
            <button className="btn" onClick={saveQuote} disabled={saving}>{saving ? "A guardar..." : "Criar Orçamento"}</button>
          </div>
        </Modal>}
      </>;
    }

    function Orders({ db, setDb, refresh, user }) {
      const [modal, setModal] = useState(false);
      const [saving, setSaving] = useState(false);
      const [filter, setFilter] = useState("todos");
      const [form, setForm] = useState({
        title: "",
        client_id: "",
        quote_id: "",
        deadline: todayISO(),
        status: "pendente",
        assignee_id: user?.id === "ceo" ? "u1" : (user?.id || "u1"),
        priority: "media",
        progress: 0,
        note: ""
      });

      const orderStatuses = ["pendente", "design", "producao", "impressao", "aplicacao", "concluido"];
      const visibleOrders = db.orders.filter(o => filter === "todos" || (o.status || "pendente") === filter);
      const active = db.orders.filter(o => (o.status || "pendente") !== "concluido").length;
      const done = db.orders.filter(o => (o.status || "pendente") === "concluido").length;
      const urgent = db.orders.filter(o => (o.status || "pendente") !== "concluido" && daysLeft(o.deadline) !== null && daysLeft(o.deadline) <= 2).length;

      function openNew() {
        setForm({
          title: "",
          client_id: db.clients[0]?.id || "",
          quote_id: "",
          deadline: todayISO(),
          status: "pendente",
          assignee_id: user?.id === "ceo" ? "u1" : (user?.id || "u1"),
          priority: "media",
          progress: 0,
          note: ""
        });
        setModal(true);
      }

      async function saveOrder() {
        if (!form.title.trim()) return alert("Mete um título na encomenda primeiro.");
        setSaving(true);

        const payload = {
          title: form.title.trim(),
          client_id: form.client_id || null,
          quote_id: form.quote_id || null,
          deadline: form.deadline || null,
          status: form.status || "pendente",
          assignee_id: form.assignee_id || null,
          priority: form.priority || "media",
          progress: Math.max(0, Math.min(100, Number(form.progress || 0))),
          note: form.note.trim() || null,
          updated_at: new Date().toISOString()
        };

        const { data, error } = await supabaseClient
          .from("orders")
          .insert(payload)
          .select()
          .single();

        setSaving(false);

        if (error) {
          return alert(
            "Erro ao guardar encomenda: " + error.message +
            "\n\nSe aparecer que a tabela orders não existe, corre o SQL de encomendas no Supabase."
          );
        }

        if (data?.id && data.assignee_id) {
          const message = `${user.name} criou encomenda: ${data.title}`;
          await supabaseClient.from("notifications").insert({ user_id: data.assignee_id, task_id: null, message, read: false });
          await sendPushToUser(data.assignee_id, "Nova encomenda/projeto", message);
        }

        setDb(p => ({ ...p, orders: data ? [data, ...p.orders] : p.orders }));
        setModal(false);
        await refresh();
      }

      async function updateOrder(order, patch) {
        const cleanPatch = { ...patch, updated_at: new Date().toISOString() };
        if (cleanPatch.progress !== undefined) {
          cleanPatch.progress = Math.max(0, Math.min(100, Number(cleanPatch.progress || 0)));
        }

        const { data, error } = await supabaseClient
          .from("orders")
          .update(cleanPatch)
          .eq("id", order.id)
          .select()
          .maybeSingle();

        if (error) return alert("Erro ao atualizar encomenda: " + error.message);

        if (cleanPatch.status === "concluido") {
          const targetUser = order.assignee_id || order.assignee || "ceo";
          const message = `Encomenda concluída: ${order.title}`;
          await supabaseClient.from("notifications").insert({ user_id: "ceo", task_id: null, message, read: false });
          await sendPushToUser("ceo", "Encomenda concluída", message);
          if (targetUser !== "ceo") await sendPushToUser(targetUser, "Encomenda concluída", message);
        }

        setDb(p => ({
          ...p,
          orders: p.orders.map(o => o.id === order.id ? { ...o, ...(data || {}), ...cleanPatch } : o)
        }));
        await refresh();
      }

      async function deleteOrder(order) {
        if (!confirm("Eliminar esta encomenda/projeto?")) return;

        const { error } = await supabaseClient
          .from("orders")
          .delete()
          .eq("id", order.id);

        if (error) return alert("Erro ao eliminar encomenda: " + error.message);

        setDb(p => ({ ...p, orders: p.orders.filter(o => o.id !== order.id) }));
        await refresh();
      }

      return <>
        <SectionHeader
          title="Encomendas & Projetos"
          subtitle="Transforma trabalhos em produção real, com fase, responsável e progresso."
          action={<button className="btn" onClick={openNew}>+ Nova Encomenda</button>}
        />

        <div className="grid-3" style={{ marginBottom: 20 }}>
          {[[active, "Ativas", "🎨", C.purple, "#EDE9FE"], [done, "Concluídas", "✅", C.green, "#DCFCE7"], [urgent, "Urgentes", "🚨", C.red, "#FEE2E2"]].map(([v,l,i,color,bg]) => (
            <div key={l} className="soft-card" style={{ background: bg }}>
              <div style={{ fontSize: 22, fontWeight: 900, color }}>{v}</div>
              <div style={{ fontSize: 11, color, fontWeight: 700 }}>{i} {l}</div>
            </div>
          ))}
        </div>

        <div className="row" style={{ marginBottom: 16, flexWrap: "wrap" }}>
          {[["todos","Todas"],["pendente","Pendentes"],["design","Design"],["producao","Produção"],["impressao","Impressão"],["aplicacao","Aplicação"],["concluido","Concluídas"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)} className={`btn small ${filter === v ? "" : "ghost"}`}>{l}</button>
          ))}
        </div>

        {visibleOrders.length === 0 ? (
          <div className="card empty">
            Ainda não tens encomendas guardadas. Usa isto para acompanhar projetos depois de aprovados: design, produção, impressão, aplicação e conclusão.
          </div>
        ) : visibleOrders.map(o => {
          const cl = db.clients.find(c => c.id === (o.clientId || o.client_id));
          const quote = db.quotes.find(q => q.id === (o.quoteId || o.quote_id));
          const assignee = getUserById(o.assignee || o.assignee_id);
          const dl = daysLeft(o.deadline);
          const dlColor = dl === null ? C.muted : dl < 0 ? C.red : dl <= 2 ? C.amber : C.green;
          const progress = Math.max(0, Math.min(100, Number(o.progress || 0)));
          const currentIndex = orderStatuses.indexOf(o.status || "pendente");
          const nextStatus = orderStatuses[currentIndex + 1];

          return <div key={o.id} className="card">
            <div className="between" style={{ alignItems: "flex-start", marginBottom: 10 }}>
              <div style={{ flex: 1 }}>
                <div className="row" style={{ marginBottom: 6, flexWrap: "wrap" }}>
                  <Badge s={o.status || "pendente"} />
                  <Tag color={o.priority === "alta" ? C.red : o.priority === "media" ? C.amber : C.muted}>{o.priority || "media"}</Tag>
                  {quote && <Tag color={C.green}>Orç. {fmt(amountOf(quote))}</Tag>}
                </div>
                <div style={{ fontWeight: 900, fontSize: 15 }}>{o.title}</div>
                <div className="tiny muted" style={{ marginTop: 3 }}>
                  🏢 {cl?.name || "Sem cliente"} · 👤 {assignee.name}
                </div>
                {o.note && <div style={{ fontSize: 12, color: C.mid, marginTop: 8, lineHeight: 1.45 }}>💬 {o.note}</div>}
              </div>

              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontSize: 12, color: dlColor, fontWeight: 900 }}>
                  {dl === null ? "Sem prazo" : dl < 0 ? `${Math.abs(dl)}d atraso` : dl === 0 ? "Hoje!" : `${dl}d restantes`}
                </div>
                <div className="tiny muted">{fmtDate(o.deadline)}</div>
                <button onClick={() => deleteOrder(o)} className="btn danger small" style={{ marginTop: 8 }}>🗑️ Apagar</button>
              </div>
            </div>

            <div>
              <div className="between tiny muted" style={{ marginBottom: 3 }}>
                <span>Progresso</span><span>{progress}%</span>
              </div>
              <div style={{ background: "var(--border)", borderRadius: 99, height: 6 }}>
                <div style={{ height: "100%", width: `${progress}%`, background: progress === 100 ? C.green : C.dark, borderRadius: 99 }} />
              </div>
            </div>

            {(o.status || "pendente") !== "concluido" && (
              <div className="row" style={{ marginTop: 12, flexWrap: "wrap" }}>
                {nextStatus && <button className="btn ghost small" onClick={() => updateOrder(o, { status: nextStatus, progress: nextStatus === "concluido" ? 100 : Math.max(progress, progress + 20) })}>→ {statusMeta[nextStatus]?.label || nextStatus}</button>}
                <button className="btn small" onClick={() => updateOrder(o, { progress: progress + 10 })}>+10%</button>
                <button className="btn green small" onClick={() => updateOrder(o, { status: "concluido", progress: 100 })}>✅ Concluir</button>
              </div>
            )}
          </div>;
        })}

        {modal && <Modal title="Nova Encomenda / Projeto" onClose={() => setModal(false)}>
          <Field label="Título *">
            <input value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} placeholder="Ex: Fachada loja Braga" />
          </Field>
          <div className="grid-2">
            <Field label="Cliente">
              <select value={form.client_id} onChange={e => setForm({ ...form, client_id: e.target.value })}>
                <option value="">Sem cliente</option>
                {db.clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </Field>
            <Field label="Orçamento ligado">
              <select value={form.quote_id} onChange={e => setForm({ ...form, quote_id: e.target.value })}>
                <option value="">Sem orçamento</option>
                {db.quotes.map(q => <option key={q.id} value={q.id}>{q.title} · {fmt(amountOf(q))}</option>)}
              </select>
            </Field>
            <Field label="Prazo">
              <input type="date" value={form.deadline} onChange={e => setForm({ ...form, deadline: e.target.value })} />
            </Field>
            <Field label="Responsável">
              <select value={form.assignee_id} onChange={e => setForm({ ...form, assignee_id: e.target.value })}>
                {USERS.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
              </select>
            </Field>
            <Field label="Estado">
              <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}>
                <option value="pendente">Pendente</option>
                <option value="design">Design</option>
                <option value="producao">Produção</option>
                <option value="impressao">Impressão</option>
                <option value="aplicacao">Aplicação</option>
                <option value="concluido">Concluído</option>
              </select>
            </Field>
            <Field label="Prioridade">
              <select value={form.priority} onChange={e => setForm({ ...form, priority: e.target.value })}>
                <option value="alta">Alta</option>
                <option value="media">Média</option>
                <option value="baixa">Baixa</option>
              </select>
            </Field>
            <Field label="Progresso (%)">
              <input type="number" min="0" max="100" value={form.progress} onChange={e => setForm({ ...form, progress: e.target.value })} />
            </Field>
          </div>
          <Field label="Notas">
            <textarea rows="3" value={form.note} onChange={e => setForm({ ...form, note: e.target.value })} placeholder="Materiais, medidas, observações da produção..." />
          </Field>
          <div className="row">
            <button className="btn ghost" onClick={() => setModal(false)}>Cancelar</button>
            <button className="btn" onClick={saveOrder} disabled={saving}>{saving ? "A guardar..." : "Criar Encomenda"}</button>
          </div>
        </Modal>}
      </>;
    }

    function Payments({ db, setDb, refresh }) {
      const [modal, setModal] = useState(false);
      const [saving, setSaving] = useState(false);
      const [filter, setFilter] = useState("todos");
      const [form, setForm] = useState({ description: "", client_id: "", amount: "", status: "por_receber", method: "transferência" });
      const received = db.payments.filter(p => p.status === "recebido").reduce((s, p) => s + amountOf(p), 0);
      const pending = db.payments.filter(p => ["pendente", "por_receber"].includes(p.status || "por_receber")).reduce((s, p) => s + amountOf(p), 0);
      const overdue = db.payments.filter(p => p.status === "atraso").reduce((s, p) => s + amountOf(p), 0);

      const visiblePayments = db.payments.filter(p => {
        const st = p.status || "por_receber";
        if (filter === "todos") return true;
        if (filter === "por_receber") return ["por_receber", "pendente"].includes(st);
        return st === filter;
      });

      async function savePayment() {
        if (!form.description.trim()) return alert("Mete uma descrição primeiro.");
        setSaving(true);
        const payload = { description: form.description.trim(), client_id: form.client_id || null, amount: Number(form.amount || 0), status: form.status, method: form.method };
        const { data, error } = await supabaseClient.from("payments").insert(payload).select().single();
        setSaving(false);
        if (error) return alert("Erro ao registar pagamento: " + error.message);
        setDb(p => ({ ...p, payments: data ? [data, ...p.payments] : p.payments }));
        setModal(false);
        await refresh();
      }

      async function updatePayment(payment, patch) {
        const { data, error } = await supabaseClient
          .from("payments")
          .update({ ...patch, updated_at: new Date().toISOString() })
          .eq("id", payment.id)
          .select()
          .maybeSingle();

        if (error) return alert("Erro ao atualizar pagamento: " + error.message);

        setDb(p => ({
          ...p,
          payments: p.payments.map(x => x.id === payment.id ? { ...x, ...(data || {}), ...patch } : x)
        }));
        await refresh();
      }

      async function deletePayment(payment) {
        if (!confirm("Eliminar este pagamento?")) return;

        const { error } = await supabaseClient
          .from("payments")
          .delete()
          .eq("id", payment.id);

        if (error) return alert("Erro ao eliminar pagamento: " + error.message);

        setDb(p => ({ ...p, payments: p.payments.filter(x => x.id !== payment.id) }));
        await refresh();
      }

      return <>
        <SectionHeader title="Pagamentos" subtitle="Controlo financeiro" action={<button className="btn" onClick={() => setModal(true)}>+ Registar</button>} />
        <div className="grid-3" style={{ marginBottom: 20 }}>
          {[[fmt(received),"Recebido",C.green,"#DCFCE7"],[fmt(pending),"A Receber",C.amber,"#FEF9C3"],[fmt(overdue),"Em Atraso",C.red,"#FEE2E2"]].map(([v,l,c,bg]) => <div key={l} className="soft-card" style={{ background: bg, border: `1px solid ${c}33` }}><div style={{ fontSize: 20, fontWeight: 900, color: c }}>{v}</div><div style={{ fontSize: 12, color: c, fontWeight: 700, marginTop: 2 }}>{l}</div></div>)}
        </div>

        <div className="row" style={{ marginBottom: 16, flexWrap: "wrap" }}>
          {[["todos","Todos"],["por_receber","A Receber"],["recebido","Recebidos"],["atraso","Em Atraso"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)} className={`btn small ${filter === v ? "" : "ghost"}`}>{l}</button>
          ))}
        </div>

        <div style={{ display: "grid", gap: 10 }}>
          {visiblePayments.map(p => {
            const cl = db.clients.find(c => c.id === p.client_id || c.id === p.clientId);
            const status = p.status || "por_receber";
            return <div key={p.id} className="card">
              <div className="between" style={{ alignItems: "flex-start", gap: 14 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 800, fontSize: 14 }}>{descOf(p)}</div>
                  <div className="tiny muted" style={{ marginTop: 4 }}>
                    {cl?.name || "Sem cliente"} · {fmtDate(p.date || p.created_at)} · {p.method || "—"}
                  </div>
                </div>
                <div style={{ textAlign: "right", flexShrink: 0 }}>
                  <div style={{ fontWeight: 900, fontSize: 17 }}>{fmt(amountOf(p))}</div>
                  <Badge s={status} />
                </div>
              </div>

              <div className="row" style={{ marginTop: 12, flexWrap: "wrap" }}>
                {status !== "recebido" && <button className="btn green small" onClick={() => updatePayment(p, { status: "recebido" })}>✅ Recebido</button>}
                {status !== "atraso" && <button className="btn ghost small" onClick={() => updatePayment(p, { status: "atraso" })}>⚠️ Atraso</button>}
                <button className="btn danger small" onClick={() => deletePayment(p)}>🗑️ Apagar</button>
              </div>
            </div>;
          })}
          {visiblePayments.length === 0 && <div className="card empty">Nenhum pagamento para mostrar neste filtro.</div>}
        </div>
        {modal && <Modal title="Registar Pagamento" onClose={() => setModal(false)}>
          <Field label="Descrição *"><input value={form.description} onChange={e => setForm({ ...form, description: e.target.value })} /></Field>
          <Field label="Cliente"><select value={form.client_id} onChange={e => setForm({ ...form, client_id: e.target.value })}><option value="">Sem cliente</option>{db.clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></Field>
          <div className="grid-2"><Field label="Valor (€)"><input type="number" value={form.amount} onChange={e => setForm({ ...form, amount: e.target.value })} /></Field><Field label="Método"><select value={form.method} onChange={e => setForm({ ...form, method: e.target.value })}>{["transferência","mbway","cheque","numerário","multibanco"].map(m => <option key={m}>{m}</option>)}</select></Field><Field label="Estado"><select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })}><option value="por_receber">Por Receber</option><option value="recebido">Recebido</option><option value="atraso">Atraso</option></select></Field></div>
          <div className="row"><button className="btn ghost" onClick={() => setModal(false)}>Cancelar</button><button className="btn" onClick={savePayment} disabled={saving}>{saving ? "A guardar..." : "Guardar"}</button></div>
        </Modal>}
      </>;
    }

    function App() {
      const [user, setUser] = useState(() => {
        const session = localStorage.getItem("studiod_logged_user");
        if (!session) return null;
        try { return normalizeUser(JSON.parse(session)); } catch { return null; }
      });
      const [tab, setTab] = useState("dashboard");
      const [menuOpen, setMenuOpen] = useState(false);
      const [notifOpen, setNotifOpen] = useState(false);
      const [newPassword, setNewPassword] = useState("");
      const [db, setDb] = useState({ tasks: [], clients: [], payments: [], notifications: [], quotes: [], orders: [] });

      async function safeSelect(table, query = "*") {
        const { data, error } = await supabaseClient.from(table).select(query);
        if (error) { console.warn(`Tabela ${table}:`, error.message); return []; }
        return data || [];
      }

      async function loadCoreData() {
        if (!user) return;
        const [tasks, clients, payments, notifications, quotes, orders] = await Promise.all([
          safeSelect("tasks"), safeSelect("clients"), safeSelect("payments"), safeSelect("notifications"), safeSelect("quotes"), safeSelect("orders")
        ]);
        setDb({
          tasks: tasks.sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)),
          clients: clients.sort((a,b) => (a.name || "").localeCompare(b.name || "")),
          payments: payments.sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)),
          notifications: notifications.filter(n => n.user_id === user.id).sort((a,b) => new Date(b.created_at || 0) - new Date(a.created_at || 0)),
          quotes: quotes.sort((a,b) => new Date(b.date || b.created_at || 0) - new Date(a.date || a.created_at || 0)),
          orders: orders.sort((a,b) => new Date(a.deadline || 0) - new Date(b.deadline || 0))
        });
      }

      useEffect(() => { (async () => { const ok = await ensureUsersForRelations(); if (ok) await ensureDefaultPasswords(); })(); }, []);
      useEffect(() => {
        if (!user) return;
        loadCoreData();
        const channel = supabaseClient.channel("global-sync").on("postgres_changes", { event: "*", schema: "public" }, () => loadCoreData()).subscribe();
        return () => supabaseClient.removeChannel(channel);
      }, [user?.id]);

      function onLogin(activeUser) {
        setUser(activeUser);
        localStorage.setItem("studiod_logged_user", JSON.stringify(activeUser));
      }
      function logout() {
        localStorage.removeItem("studiod_logged_user");
        setUser(null);
        setTab("dashboard");
        setMenuOpen(false);
      }
      async function changePassword() {
        const clean = newPassword.trim();
        if (!clean) return alert("Insere uma password válida.");
        const { data, error } = await supabaseClient.from("users").update({ password: clean }).eq("id", user.id).select("id,name,role,password").maybeSingle();
        if (error) return alert("Erro ao guardar nova password: " + error.message);
        const updated = normalizeUser(data || { ...user, password: clean }, USERS.find(u => u.id === user.id));
        setUser(updated);
        localStorage.setItem("studiod_logged_user", JSON.stringify(updated));
        setNewPassword("");
        setMenuOpen(false);
        alert("🔒 Nova password guardada com sucesso.");
      }
      async function activatePush() {
        await enablePushNotificationsForUser(user);
      }

      async function markAllRead() {
        await supabaseClient.from("notifications").update({ read: true }).eq("user_id", user.id);
        await loadCoreData();
      }

      if (!user) return <Login onLogin={onLogin} />;
      const visibleTabs = TABS.filter(t => !t.perm || can(user, t.perm));
      const unread = db.notifications.filter(n => !n.read);

          <div className="top-actions">
            <div style={{ position: "relative" }}>
              <button className="notif-btn" onClick={() => { setNotifOpen(!notifOpen); setMenuOpen(false); }}>🔔{unread.length > 0 && <span className="notif-badge">{unread.length}</span>}</button>
              {notifOpen && <div className="dropdown">
                <div className="between" style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)" }}><span style={{ fontWeight: 800, fontSize: 14 }}>🔔 Notificações</span>{unread.length > 0 && <button onClick={markAllRead} style={{ background: "none", border: "none", fontSize: 11, color: C.blue, fontWeight: 800 }}>Marcar tudo lido</button>}</div>
                {db.notifications.length === 0 && <div className="empty" style={{ padding: "20px 16px" }}>Sem notificações</div>}
                {db.notifications.map(n => <div key={n.id} style={{ padding: "12px 16px", borderBottom: "1px solid var(--border)", background: n.read ? "#fff" : "#F0FDF4", display: "flex", gap: 10 }}><span>✅</span><div style={{ flex: 1 }}><div style={{ fontSize: 13, fontWeight: n.read ? 500 : 800, lineHeight: 1.4 }}>{n.message || n.msg}</div><div className="tiny muted" style={{ marginTop: 2 }}>{fmtDate(n.created_at)}</div></div>{!n.read && <span style={{ width: 8, height: 8, borderRadius: "50%", background: C.green, flexShrink: 0, marginTop: 4 }} />}</div>)}
              </div>}
            </div>
            <div style={{ position: "relative" }}>
              <button className="profile-btn" onClick={() => { setMenuOpen(!menuOpen); setNotifOpen(false); }}><Avatar u={user} size={26} /><div style={{ textAlign: "left" }}><div style={{ fontSize: 12, fontWeight: 700 }}>{getFirstName(user.name)}</div></div><span style={{ fontSize: 9, color: "#555" }}>▼</span></button>
              {menuOpen && <div className="dropdown" style={{ padding: 16 }}>
                <h4 style={{ margin: "0 0 10px" }}>Definições de Conta</h4>
                <button className="btn accent full" style={{ marginBottom: 12 }} onClick={activatePush}>🔔 Ativar notificações neste telemóvel</button>
                <Field label="Alterar a tua Password"><input type="password" placeholder="Nova senha pessoal..." value={newPassword} onChange={e => setNewPassword(e.target.value)} /></Field>
                <button className="btn full" onClick={changePassword}>Guardar Nova Chave</button>
                <button className="btn danger full" style={{ marginTop: 12 }} onClick={logout}>Sair</button>
              </div>}
            </div>
          </div>
        </header>
        <nav className="nav">
          {visibleTabs.map(t => <button key={t.id} onClick={() => setTab(t.id)} className={`tab-btn ${tab === t.id ? "active" : ""}`}>{t.icon} {t.label}</button>)}
        </nav>
        <main>
          {tab === "dashboard" && <Dashboard db={db} user={user} />}
          {tab === "tasks" && <Tasks db={db} user={user} refresh={loadCoreData} setDb={setDb} />}
          {tab === "clients" && <Clients db={db} user={user} refresh={loadCoreData} setDb={setDb} />}
          {tab === "quotes" && <Quotes db={db} setDb={setDb} refresh={loadCoreData} user={user} />}
          {tab === "orders" && <Orders db={db} user={user} refresh={loadCoreData} setDb={setDb} />}
          {tab === "payments" && <Payments db={db} refresh={loadCoreData} setDb={setDb} />}
        </main>
      </div>;

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
    if (window.__studiodLoaded) window.__studiodLoaded();
  
        </script>
    </body>
